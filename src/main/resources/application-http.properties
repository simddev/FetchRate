spring.config.import=optional:file:./fetchrate.properties
spring.application.name=FetchRate
spring.main.banner-mode=off
server.port=8000
server.address=127.0.0.1
spring.datasource.url=jdbc:sqlite:data/exchange_rates.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.connection-test-query=SELECT 1
fetchrate.api-key=${FETCHRATE_API_KEY:}
fetchrate.crypto-dir=data/crypto
server.error.whitelabel.enabled=false
management.endpoints.web.exposure.include=health