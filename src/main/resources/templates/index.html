<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FetchRate</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --container-bg: #1a1a1a;
            --text-color: #e0e0e0;
            --accent-color: #9d50bb;
            --input-bg: #242424;
            --input-border: #333;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: var(--container-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 550px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        h1 {
            color: var(--accent-color);
            font-size: 3.5rem;
            margin-bottom: 2rem;
            letter-spacing: -1px;
            font-weight: 800;
            text-shadow: 0 0 20px rgba(157, 80, 187, 0.3);
            margin-top: 0;
        }
        .form-group {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        input, select {
            background-color: var(--input-bg);
            color: var(--text-color);
            border: 1px solid var(--input-border);
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus, select:focus {
            border-color: var(--accent-color);
        }
        #amount {
            flex: 2;
            min-width: 120px;
        }
        select {
            flex: 1;
            min-width: 100px;
        }
        input[type="date"] {
            width: 100%;
            margin-bottom: 1.5rem;
            box-sizing: border-box;
        }
        button {
            background-color: var(--accent-color);
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.3s, transform 0.1s;
        }
        button:hover {
            opacity: 0.9;
        }
        button:active {
            transform: scale(0.98);
        }
        #result {
            margin-top: 2rem;
            padding: 15px;
            border-radius: 6px;
            background-color: rgba(187, 134, 252, 0.1);
            font-size: 1.2rem;
            display: none;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .error {
            color: #cf6679;
        }
        .instructions {
            color: #a0a0a0;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            line-height: 1.4;
        }
        .human-readable {
            margin-top: 1rem;
            font-size: 1rem;
            color: #b0b0b0;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>FetchRate</h1>
        <div class="instructions">
            Enter the amount and currency on a given date to learn how much it was worth in Euro on that day.<br>
            Exchange rates used are from the European Central Bank and LiveCoinWatch.
        </div>
        <div class="form-group">
            <input type="text" id="amount" placeholder="Amount" aria-label="Amount">
            <select id="fiat-currency" aria-label="Fiat currency" onchange="clearOther(this, 'crypto-currency')">
                <option value="" disabled selected>Fiat</option>
                <option value="EUR">EUR - Euro</option>
                <option th:each="curr : ${fiats}" th:value="${curr}" th:text="${curr} + ' - ' + ${currencyNames.get(curr)}"></option>
            </select>
            <select id="crypto-currency" aria-label="Cryptocurrency" onchange="clearOther(this, 'fiat-currency')">
                <option value="" disabled selected>Crypto</option>
                <option th:each="curr : ${cryptos}" th:value="${curr}" th:text="${curr} + ' - ' + ${currencyNames.get(curr)}"></option>
            </select>
        </div>
        <input type="date" id="date" aria-label="Date">
        <button id="fetch-btn" onclick="fetchRate()">Fetch Rate</button>
        <div id="result"></div>
    </div>

    <script th:inline="javascript">
        const currencyNames = /*[[${currencyNames}]]*/ {};

        // Set today as default date and block future dates
        const dateInput = document.getElementById('date');
        const today = new Date().toISOString().split('T')[0];
        dateInput.value = today;
        dateInput.max = today;

        // Add Enter key listener to amount field
        document.getElementById('amount').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                fetchRate();
            }
        });

        // Add Enter key listener to date field
        document.getElementById('date').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                fetchRate();
            }
        });

        function formatNumber(num) {
            return new Intl.NumberFormat('en-US').format(num);
        }

        function getOrdinal(n) {
            const s = ["th", "st", "nd", "rd"];
            const v = n % 100;
            return n + (s[(v - 20) % 10] || s[v] || s[0]);
        }

        function formatDate(dateStr) {
            const [year, month, day] = dateStr.split('-').map(Number);
            const date = new Date(year, month - 1, day);
            return `${getOrdinal(day)} of ${date.toLocaleString('en-US', { month: 'long' })} ${year}`;
        }

        function clearOther(current, otherId) {
            if (current.value) {
                document.getElementById(otherId).selectedIndex = 0;
            }
        }

        async function fetchRate() {
            const amountInput = document.getElementById('amount').value;
            const fiatSelect = document.getElementById('fiat-currency');
            const cryptoSelect = document.getElementById('crypto-currency');
            const currency = fiatSelect.value || cryptoSelect.value;
            const date = document.getElementById('date').value;
            const resultDiv = document.getElementById('result');
            const btn = document.getElementById('fetch-btn');

            if (!amountInput || !currency || !date) {
                resultDiv.innerHTML = '<span class="error">Please fill all fields</span>';
                resultDiv.style.display = 'block';
                return;
            }

            resultDiv.style.display = 'none';
            resultDiv.style.animation = 'none';
            resultDiv.offsetHeight;
            resultDiv.style.animation = '';

            btn.disabled = true;
            btn.textContent = 'Fetching...';

            try {
                const url = `/convert?amount=${encodeURIComponent(amountInput)}&input_currency=${currency}&date=${date}`;
                const response = await fetch(url);
                const data = await response.json();

                if (response.ok) {
                    const amountFormatted = formatNumber(data.input.amount);
                    const euroFormatted = formatNumber(data.output.inEuro);
                    const currencyName = currencyNames[data.input.currencySymbol] || data.input.currencySymbol;
                    const humanDate = formatDate(data.input.date);
                    const dateISO = data.input.date.replace(/-/g, '/');

                    const rawOutput = `${amountFormatted} ${data.input.currencySymbol} on ${dateISO} was ${euroFormatted} EUR.`;
                    const humanOutput = `<div class="human-readable">${amountFormatted} ${currencyName} (${data.input.currencySymbol}) on the ${humanDate} was equivalent to ${euroFormatted} Euro (EUR).</div>`;

                    resultDiv.innerHTML = `<div>${rawOutput}</div>${humanOutput}`;
                    resultDiv.classList.remove('error');
                } else {
                    resultDiv.innerText = data.error || 'An error occurred';
                    resultDiv.classList.add('error');
                }
            } catch (error) {
                resultDiv.innerText = 'Failed to connect to server';
                resultDiv.classList.add('error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Fetch Rate';
            }
            resultDiv.style.display = 'block';
        }
    </script>
</body>
</html>
